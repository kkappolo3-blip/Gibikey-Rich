                      onClick={() => { setPlatform(p.id); setPlatformName(p.name); }}
                    >
                      {p.icon} {p.name}
                    </div>
                  ))}
                </div>
              </div>
              <div className="pwd-form-group">
                <label className="pwd-form-label">Nama Platform <span className="required">*</span></label>
                <input 
                  className="pwd-form-input" 
                  placeholder="Ketik nama platform..." 
                  value={platformName} 
                  onChange={(e) => { setPlatformName(e.target.value); setPlatform('custom'); }}
                />
              </div>
              <div className="pwd-form-group">
                <label className="pwd-form-label">Sub judul <span className="optional">(opsional)</span></label>
                <input className="pwd-form-input" placeholder="cth: Personal, Kerja" value={subtitle} onChange={(e) => setSubtitle(e.target.value)} />
              </div>
              <div className="pwd-form-group">
                <label className="pwd-form-label">Username / Email <span className="optional">(opsional)</span></label>
                <input className="pwd-form-input" placeholder="username@email.com" value={username} onChange={(e) => setUsername(e.target.value)} />
              </div>
              <div className="pwd-form-group">
                <label className="pwd-form-label">Password <span className="optional">(opsional)</span></label>
                <div className="pwd-password-wrapper">
                  <input 
                    className="pwd-form-input" 
                    type={showPwd ? "text" : "password"} 
                    placeholder="••••••••" 
                    value={password} 
                    onChange={(e) => setPassword(e.target.value)} 
                    style={{ paddingRight: 44 }}
                  />
                  <button className="pwd-password-toggle" onClick={() => setShowPwd(!showPwd)}>
                    {showPwd ? '🙈' : '👁️'}
                  </button>
                </div>
                {password && (
                  <div style={{ marginTop: 8 }}>
                    <div className="pwd-password-strength">
                      <div className={`pwd-password-strength-bar ${passwordStrength.level}`}></div>
                    </div>
                    <span style={{ fontSize: 11, color: 'var(--studio-gray)' }}>Kekuatan: {passwordStrength.text}</span>
                  </div>
                )}
              </div>
              <div className="pwd-form-group">
                <label className="pwd-form-label">URL / Link <span className="optional">(opsional)</span></label>
                <input className="pwd-form-input" placeholder="https://..." value={url} onChange={(e) => setUrl(e.target.value)} />
              </div>
              <div className="pwd-form-group">
                <label className="pwd-form-label">Catatan <span className="optional">(opsional)</span></label>
                <textarea className="pwd-form-input pwd-form-textarea" placeholder="Catatan tambahan..." value={notes} onChange={(e) => setNotes(e.target.value)} />
              </div>
              <div className="pwd-form-group">
                <label className="pwd-form-label">Gambar / Screenshot <span className="optional">(opsional)</span></label>
                <div className="pwd-image-upload" onClick={() => document.getElementById('pwd-img-upload-edit').click()}>
                  {imageData ? (
                    <img src={imageData} className="pwd-image-preview" alt="Preview" />
                  ) : (
                    <>
                      <div className="pwd-image-upload-icon">📷</div>
                      <div className="pwd-image-upload-text">Tambah Gambar / Screenshot</div>
                    </>
                  )}
                </div>
                <input id="pwd-img-upload-edit" type="file" accept="image/*" onChange={handleImageUpload} style={{ display: 'none' }} />
              </div>
            </>
          )}
          
          {type === 'document' && (
            <>
              <div className="pwd-form-group">
                <label className="pwd-form-label">Judul <span className="required">*</span></label>
                <input className="pwd-form-input" placeholder="Judul dokumen..." value={title} onChange={(e) => setTitle(e.target.value)} />
              </div>
              <div className="pwd-form-group">
                <label className="pwd-form-label">Deskripsi <span className="optional">(opsional)</span></label>
                <textarea className="pwd-form-input pwd-form-textarea" placeholder="Deskripsi dokumen..." value={subtitle} onChange={(e) => setSubtitle(e.target.value)} />
              </div>
              <div className="pwd-form-group">
                <label className="pwd-form-label">Foto <span className="optional">(opsional)</span></label>
                <div className="pwd-image-upload" onClick={() => document.getElementById('pwd-img-upload-doc-edit').click()}>
                  {imageData ? (
                    <img src={imageData} className="pwd-image-preview" alt="Preview" />
                  ) : (
                    <>
                      <div className="pwd-image-upload-icon">📷</div>
                      <div className="pwd-image-upload-text">Tambah Foto</div>
                    </>
                  )}
                </div>
                <input id="pwd-img-upload-doc-edit" type="file" accept="image/*" onChange={handleImageUpload} style={{ display: 'none' }} />
              </div>
            </>
          )}
          
          {type === 'link' && (
            <>
              <div className="pwd-form-group">
                <label className="pwd-form-label">Judul <span className="optional">(opsional)</span></label>
                <input className="pwd-form-input" placeholder="Judul link..." value={title} onChange={(e) => setTitle(e.target.value)} />
              </div>
              <div className="pwd-form-group">
                <label className="pwd-form-label">URL <span className="required">*</span></label>
                <input className="pwd-form-input" placeholder="https://..." value={url} onChange={(e) => setUrl(e.target.value)} />
              </div>
              <div className="pwd-form-group">
                <label className="pwd-form-label">Deskripsi <span className="optional">(opsional)</span></label>
                <textarea className="pwd-form-input pwd-form-textarea" placeholder="Deskripsi link..." value={subtitle} onChange={(e) => setSubtitle(e.target.value)} />
              </div>
            </>
          )}
          
          <button className="pwd-submit-btn" onClick={handleUpdate}>💾 Simpan Perubahan</button>
        </div>
      </div>
    </div>
  );
}

// ========== RENDER ==========
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
