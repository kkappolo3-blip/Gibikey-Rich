<body>
<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useMemo, useRef, useCallback } = React;

// ========== HELPERS ==========
const fmt = (n) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(n || 0);
const uid = () => Math.random().toString(36).slice(2, 10);

// FIX: Create date from local components to avoid timezone issues
const iso = (d) => {
  if (typeof d === 'string') {
    // If already ISO string, extract parts
    const parts = d.split('-');
    if (parts.length === 3) {
      return d; // Already in ISO format
    }
  }
  const date = new Date(d);
  const year = date.getFullYear();
  const month = String(date.getMonth() + 1).padStart(2, '0');
  const day = String(date.getDate()).padStart(2, '0');
  return `${year}-${month}-${day}`;
};

// FIX: Create local date without timezone shift
const createLocalDate = (year, month, day) => {
  return new Date(year, month, day);
};

// FIX: Parse ISO date string to local date correctly
const parseLocalDate = (isoString) => {
  if (!isoString) return null;
  const parts = isoString.split('-');
  if (parts.length !== 3) return null;
  return new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
};

const idDateShort = (d) => {
  const date = typeof d === 'string' ? parseLocalDate(d) : d;
  return date ? date.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: '2-digit' }) : '';
};
const idDateFull = (d) => {
  const date = typeof d === 'string' ? parseLocalDate(d) : d;
  return date ? date.toLocaleDateString('id-ID', { day: '2-digit', month: 'long', year: 'numeric' }) : '';
};

const daysInMonth = (year, month) => new Date(year, month + 1, 0).getDate();
const getMonthDates = (year, month) => {
  const dates = [];
  const days = daysInMonth(year, month);
  for (let i = 1; i <= days; i++) {
    dates.push(createLocalDate(year, month, i));
  }
  return dates;
};

// ========== FIREBASE SERVICE ==========
// Get or create a unique user ID (stored only for identification, NOT for data)
const getUserId = () => {
  let userId = localStorage.getItem('gibikey_user_id');
  if (!userId) {
    userId = 'user_' + Math.random().toString(36).slice(2, 12);
    localStorage.setItem('gibikey_user_id', userId);
  }
  return userId;
};

// Firebase configuration helper
const getFirebaseConfig = () => {
  try {
    const config = localStorage.getItem('gibikey_firebase_config');
    return config ? JSON.parse(config) : null;
  } catch {
    return null;
  }
};

// Save Firebase config
const saveFirebaseConfig = (config) => {
  localStorage.setItem('gibikey_firebase_config', JSON.stringify(config));
};

// Clear Firebase config
const clearFirebaseConfig = () => {
  localStorage.removeItem('gibikey_firebase_config');
};

// Firebase database reference
let firebaseDb = null;
let firebaseConnected = false;

const initFirebase = () => {
  const config = getFirebaseConfig();
  if (!config || !config.apiKey || !config.databaseURL) {
    return false;
  }
  
  try {
    if (!firebase.apps.length) {
      firebase.initializeApp(config);
    }
    firebaseDb = firebase.database();
    return true;
  } catch (e) {
    console.error('Firebase init error:', e);
    return false;
  }
};

// Cloud storage service - ALL data goes to Firebase
const cloud = {
  // Get data from Firebase
  get: async (key) => {
    if (!firebaseDb) return null;
    try {
      const userId = getUserId();
      const snapshot = await firebaseDb.ref(`users/${userId}/${key}`).once('value');
      return snapshot.val();
    } catch (e) {
      console.error('Cloud get error:', e);
      return null;
    }
  },
  
  // Set data to Firebase
  set: async (key, value) => {
    if (!firebaseDb) return false;
    try {
      const userId = getUserId();
      await firebaseDb.ref(`users/${userId}/${key}`).set(value);
      return true;
    } catch (e) {
      console.error('Cloud set error:', e);
      return false;
    }
  },
  
  // Subscribe to real-time updates
  subscribe: (key, callback) => {
    if (!firebaseDb) return () => {};
    const userId = getUserId();
    const ref = firebaseDb.ref(`users/${userId}/${key}`);
    ref.on('value', (snapshot) => {
      callback(snapshot.val());
    });
    return () => ref.off('value');
  },
  
  // Check connection status
  onConnectionChange: (callback) => {
    if (!firebaseDb) return () => {};
    const ref = firebaseDb.ref('.info/connected');
    ref.on('value', (snapshot) => {
      callback(snapshot.val());
    });
    return () => ref.off('value');
  }
};

// LocalStorage fallback (only for config and user ID, NOT for data)
const ls = {
  get: (k, fb) => { try { return JSON.parse(localStorage.getItem('gibikey_' + k)) ?? fb } catch { return fb } },
  set: (k, v) => localStorage.setItem('gibikey_' + k, JSON.stringify(v))
};

// ========== DRAGGABLE HOOK ==========
function useDraggable() {
  const [position, setPosition] = useState({ x: 0, y: 0 });
  const [isDragging, setIsDragging] = useState(false);
  const dragStart = useRef({ x: 0, y: 0 });
  const modalRef = useRef(null);

  const handleMouseDown = useCallback((e) => {
    if (e.target.closest('button') || e.target.closest('input') || e.target.closest('select') || e.target.closest('textarea')) {
      return;
    }
    setIsDragging(true);
    dragStart.current = {
      x: e.clientX - position.x,
      y: e.clientY - position.y
    };
    e.preventDefault();
  }, [position]);

  const handleMouseMove = useCallback((e) => {
    if (!isDragging) return;
    setPosition({
      x: e.clientX - dragStart.current.x,
      y: e.clientY - dragStart.current.y
    });
  }, [isDragging]);

  const handleMouseUp = useCallback(() => {
    setIsDragging(false);
  }, []);

  useEffect(() => {
    if (isDragging) {
      document.addEventListener('mousemove', handleMouseMove);
      document.addEventListener('mouseup', handleMouseUp);
      return () => {
        document.removeEventListener('mousemove', handleMouseMove);
        document.removeEventListener('mouseup', handleMouseUp);
      };
    }
  }, [isDragging, handleMouseMove, handleMouseUp]);

  const resetPosition = useCallback(() => {
    setPosition({ x: 0, y: 0 });
  }, []);

  return { position, handleMouseDown, modalRef, resetPosition };
}

// ========== TOAST HOOK ==========
function useToast() {
  const [toast, setToast] = useState(null);
  const show = (message, type = 'success') => {
    setToast({ message, type });
    setTimeout(() => setToast(null), 3000);
  };
  const node = toast ? (
    <div className={`toast ${toast.type}`}>
      {toast.type === 'success' ? '✅' : '❌'} {toast.message}
    </div>
  ) : null;
  return [show, node];
}

// ========== CONFIG SETUP COMPONENT ==========
function ConfigSetup({ onSave, existingConfig }) {
  const [config, setConfig] = useState(existingConfig || {
    apiKey: '',
    authDomain: '',
    databaseURL: '',
    projectId: '',
    storageBucket: '',
    messagingSenderId: '',
    appId: ''
  });
  const [testing, setTesting] = useState(false);
  const [testResult, setTestResult] = useState(null);
  const [toast, showToast] = useToast();

  const handleChange = (field, value) => {
    setConfig({ ...config, [field]: value });
    setTestResult(null);
  };

  const handleTest = async () => {
    if (!config.apiKey || !config.databaseURL) {
      showToast('API Key dan Database URL wajib diisi!', 'error');
      return;
    }

    setTesting(true);
    setTestResult(null);

    try {
      // Test Firebase initialization
      if (firebase.apps.length) {
        await firebase.app().delete();
      }
      
      firebase.initializeApp(config);
      const db = firebase.database();
      
      // Test read
      await db.ref('.info/connected').once('value');
      
      setTestResult({ success: true, message: 'Koneksi berhasil!' });
      showToast('Koneksi Firebase berhasil!', 'success');
    } catch (e) {
      console.error('Test error:', e);
      setTestResult({ success: false, message: e.message });
      showToast('Koneksi gagal: ' + e.message, 'error');
    } finally {
      setTesting(false);
    }
  };

  const handleSave = () => {
    if (!config.apiKey || !config.databaseURL) {
      showToast('API Key dan Database URL wajib diisi!', 'error');
      return;
    }
    
    saveFirebaseConfig(config);
    showToast('Konfigurasi disimpan!', 'success');
    setTimeout(() => {
      onSave(config);
    }, 500);
  };

  return (
    <div className="config-setup-page">
      <div className="config-setup-card">
        <h2>☁️ Setup Firebase</h2>
        <p className="subtitle">
          Masukkan konfigurasi Firebase dari Firebase Console Anda. 
          Data ini akan disimpan di localStorage browser dan tidak dikirim ke server manapun.
        </p>

        <div className="config-field">
          <label>API Key *</label>
          <input
            type="text"
            className="fb-input"
            placeholder="AIzaSy..."
            value={config.apiKey}
            onChange={(e) => handleChange('apiKey', e.target.value)}
          />
          <div className="hint">Dari Project Settings → General → Your apps</div>
        </div>

        <div className="config-field">
          <label>Auth Domain</label>
          <input
            type="text"
            className="fb-input"
            placeholder="your-project.firebaseapp.com"
            value={config.authDomain}
            onChange={(e) => handleChange('authDomain', e.target.value)}
          />
        </div>

        <div className="config-field">
          <label>Database URL *</label>
          <input
            type="text"
            className="fb-input"
            placeholder="https://your-project-default-rtdb.firebaseio.com"
            value={config.databaseURL}
            onChange={(e) => handleChange('databaseURL', e.target.value)}
          />
          <div className="hint">URL dari Realtime Database (bukan Cloud Storage)</div>
        </div>

        <div className="config-field">
          <label>Project ID</label>
          <input
            type="text"
            className="fb-input"
            placeholder="your-project-id"
            value={config.projectId}

// ========== MAIN APP ==========
function App() {
  const [navOpen, setNavOpen] = useState(false);
  const [toast, showToast] = useToast();
  const [showSettings, setShowSettings] = useState(false);
  const [showFirebaseSettings, setShowFirebaseSettings] = useState(false);
  
  // Cloud state
  const [isCloudReady, setIsCloudReady] = useState(false);
  const [isLoading, setIsLoading] = useState(true);
  const [isConnected, setIsConnected] = useState(false);
  const [hasConfig, setHasConfig] = useState(false);
  
  // Current view
  const [sidebarTab, setSidebarTab] = useState('budget');
  const [subTab, setSubTab] = useState('simulasi'); // simulasi, kalender, buku-periode
  
  // Simulation period
  const today = new Date();
  const defStart = iso(createLocalDate(today.getFullYear(), today.getMonth(), 1));
  const defEnd = iso(createLocalDate(today.getFullYear(), today.getMonth() + 1, 0));
  
  // Data states - initialize empty, will be loaded from Firebase
  const [period, setPeriod] = useState({ start: defStart, end: defEnd });
  
  // Data states
  const [incomes, setIncomes] = useState([]);
  
  // Template Tagihan
  const [templates, setTemplates] = useState([]);
  
  // Saved Simulations
  const [savedSimulations, setSavedSimulations] = useState([]);
  
  const [simBills, setSimBills] = useState([]);
  const [tagihan, setTagihan] = useState([]);
  const [bukuPeriode, setBukuPeriode] = useState([]);
  
  // Modals
  const [showAddBillModal, setShowAddBillModal] = useState(false);
  const [editingSimBill, setEditingSimBill] = useState(null);
  const [editingTagihan, setEditingTagihan] = useState(null);
  const [moveTagihan, setMoveTagihan] = useState(null);
  const [showTemplateManager, setShowTemplateManager] = useState(false);
  
  // ========== INITIALIZE FIREBASE ==========
  const initializeApp = useCallback(() => {
    const config = getFirebaseConfig();
    setHasConfig(!!config && !!config.apiKey);
    
    if (!config || !config.apiKey || !config.databaseURL) {
      setIsLoading(false);
      return;
    }
    
    // Initialize Firebase
    const success = initFirebase();
    if (!success) {
      setIsLoading(false);
      return;
    }
    
    // Subscribe to connection status
    const unsubConn = cloud.onConnectionChange((connected) => {
      setIsConnected(connected);
    });
    
    // Load all data from Firebase
    const loadData = async () => {
      try {
        const [
          periodData,
          incomesData,
          templatesData,
          savedSimData,
          simBillsData,
          tagihanData,
          bukuData
        ] = await Promise.all([
          cloud.get('period'),
          cloud.get('incomes'),
          cloud.get('templates'),
          cloud.get('savedSimulations'),
          cloud.get('simBills'),
          cloud.get('tagihan'),
          cloud.get('bukuPeriode')
        ]);
        
        if (periodData) setPeriod(periodData);
        if (incomesData) setIncomes(incomesData);
        if (templatesData) setTemplates(templatesData);
        if (savedSimData) setSavedSimulations(savedSimData);
        if (simBillsData) setSimBills(simBillsData);
        if (tagihanData) setTagihan(tagihanData);
        if (bukuData) setBukuPeriode(bukuData);
        
        setIsCloudReady(true);
      } catch (e) {
        console.error('Failed to load data:', e);
        showToast('Gagal memuat data dari cloud', 'error');
      } finally {
        setIsLoading(false);
      }
    };
    
    loadData();
    
    return () => {
      unsubConn();
    };
  }, []);

  useEffect(() => {
    initializeApp();
  }, [initializeApp]);
  
  // ========== HANDLE CONFIG SAVE ==========
  const handleConfigSave = (config) => {
    setHasConfig(true);
    setIsLoading(true);
    setShowFirebaseSettings(false);
    // Reload the app
    window.location.reload();
  };
  
  // ========== PERSIST TO CLOUD ==========
  useEffect(() => {
    if (isCloudReady && hasConfig) {
      cloud.set('period', period);
    }
  }, [period, isCloudReady, hasConfig]);
  
  useEffect(() => {
    if (isCloudReady && hasConfig) {
      cloud.set('incomes', incomes);
    }
  }, [incomes, isCloudReady, hasConfig]);
  
  useEffect(() => {
    if (isCloudReady && hasConfig) {
      cloud.set('templates', templates);
    }
  }, [templates, isCloudReady, hasConfig]);
  
  useEffect(() => {
    if (isCloudReady && hasConfig) {
      cloud.set('savedSimulations', savedSimulations);
    }
  }, [savedSimulations, isCloudReady, hasConfig]);
  
  useEffect(() => {
    if (isCloudReady && hasConfig) {
      cloud.set('simBills', simBills);
    }
  }, [simBills, isCloudReady, hasConfig]);
  
  useEffect(() => {
    if (isCloudReady && hasConfig) {
      cloud.set('tagihan', tagihan);
    }
  }, [tagihan, isCloudReady, hasConfig]);
  
  useEffect(() => {
    if (isCloudReady && hasConfig) {
      cloud.set('bukuPeriode', bukuPeriode);
    }
  }, [bukuPeriode, isCloudReady, hasConfig]);
  
  // ========== INCOME HANDLERS ==========
  const addIncome = () => {
    setIncomes([...incomes, { id: uid(), name: '', amount: 0, receiveDate: period.start }]);
  };
  const updateIncome = (id, patch) => {
    setIncomes(incomes.map(i => i.id === id ? { ...i, ...patch } : i));
  };
  const removeIncome = (id) => {
    setIncomes(incomes.filter(i => i.id !== id));
  };
  
  // ========== TEMPLATE HANDLERS ==========
  const addTemplate = (templateData) => {
    setTemplates([...templates, { ...templateData, id: uid() }]);
    showToast('Template ditambahkan');
  };
  
  const updateTemplate = (id, data) => {
    setTemplates(templates.map(t => t.id === id ? { ...t, ...data } : t));
    showToast('Template diperbarui');
  };
  
  const deleteTemplate = (id) => {
    setTemplates(templates.filter(t => t.id !== id));
    showToast('Template dihapus');
  };
  
  // ========== SAVED SIMULATION HANDLERS (NEW) ==========
  const saveSimulation = (name) => {
    const simulation = {
      id: uid(),
      name: name || `Simulasi ${savedSimulations.length + 1}`,
      createdAt: new Date().toISOString(),
      period: { ...period },
      incomes: [...incomes],
      bills: [...simBills]
    };
    setSavedSimulations([simulation, ...savedSimulations]);
    showToast('Simulasi disimpan!');
    return simulation.id;
  };
  
  const loadSimulation = (simId) => {
    const sim = savedSimulations.find(s => s.id === simId);
    if (sim) {
      setPeriod(sim.period);
      setIncomes(sim.incomes);
      setSimBills(sim.bills);
      showToast('Simulasi dimuat!');
    }
  };
  
  const deleteSimulation = (id) => {
    setSavedSimulations(savedSimulations.filter(s => s.id !== id));
    showToast('Simulasi dihapus');
  };
  
  const updateSavedSimulation = (id) => {
    setSavedSimulations(savedSimulations.map(s => s.id === id ? {
      ...s,
      period: { ...period },
      incomes: [...incomes],
      bills: [...simBills],
      updatedAt: new Date().toISOString()
    } : s));
    showToast('Simulasi diperbarui!');
  };
  
  // ========== SIMULATION BILL HANDLERS ==========
  const saveSimBill = (billData) => {
    if (!billData.name || billData.amount <= 0) {
      showToast('Lengkapi nama dan jumlah tagihan', 'error');
      return false;
    }
    
    if (billData.id && simBills.find(b => b.id === billData.id)) {
      setSimBills(simBills.map(b => b.id === billData.id ? billData : b));
      showToast('Simulasi tagihan diperbarui');
    } else {
      setSimBills([...simBills, { ...billData, id: uid() }]);
      showToast('Simulasi tagihan ditambahkan');
    }
    return true;
  };
  
  const deleteSimBill = (id) => {
    setSimBills(simBills.filter(b => b.id !== id));
    showToast('Simulasi tagihan dihapus');
  };
  
  const clearAllSimBills = () => {
    if (simBills.length === 0) {
      showToast('Tidak ada simulasi tagihan untuk dihapus', 'error');
      return;
    }
    if (confirm(`Hapus semua ${simBills.length} simulasi tagihan? Data pemasukan dan template tidak akan terpengaruh.`)) {
      setSimBills([]);
      showToast('Semua simulasi tagihan dihapus');
    }
  };
  
  // ========== GENERATE TO TAGIHAN (Individual Occurrences) ==========
  const generateToTagihan = () => {
    if (simBills.length === 0) {
      showToast('Tidak ada simulasi tagihan', 'error');
      return;
    }
    
    const validBills = simBills.filter(b => b.name && b.amount > 0);
    if (validBills.length === 0) {
      showToast('Tidak ada simulasi tagihan valid', 'error');
      return;
    }
    
    const startDate = parseLocalDate(period.start);
    const endDate = parseLocalDate(period.end);
    const startDay = startDate.getDate();
    const endDay = endDate.getDate();
    const year = startDate.getFullYear();
    const month = startDate.getMonth();
    
    const newTagihans = [];
    
    validBills.forEach(bill => {
      const billDate = parseLocalDate(bill.dueDate);
      const dueDay = billDate ? billDate.getDate() : 1;
      
      if (bill.recurring && bill.recurringDays > 0) {
        // Create individual occurrence for each date within period
        for (let day = startDay; day <= endDay; day++) {
          if (day >= dueDay && (day - dueDay) % bill.recurringDays === 0) {
            newTagihans.push({
              id: uid(),
              templateId: bill.id,
              name: bill.name,
              amount: bill.amount,
              dueDate: iso(createLocalDate(year, month, day)),
              originalDueDay: dueDay,
              recurringDays: bill.recurringDays,
              paid: false,
              paidAt: null,
              createdAt: new Date().toISOString()
            });
          }
        }
      } else {
        // One-time bill
        if (dueDay >= startDay && dueDay <= endDay) {
          newTagihans.push({
            id: uid(),
            templateId: bill.id,
            name: bill.name,
            amount: bill.amount,
            dueDate: bill.dueDate,
            originalDueDay: dueDay,
            recurringDays: 0,
            paid: false,
            paidAt: null,
            createdAt: new Date().toISOString()
          });
        }
      }
    });
    
    setTagihan([...newTagihans, ...tagihan]);
    setSimBills([]);
    showToast(`${newTagihans.length} tagihan berhasil dibuat!`);
    setSubTab('kalender');
  };
  
  // ========== TAGIHAN HANDLERS ==========
  const togglePaid = (id) => {
    const bill = tagihan.find(t => t.id === id);
    setTagihan(tagihan.map(t => t.id === id ? { 
      ...t, 
      paid: !t.paid, 
      paidAt: !t.paid ? new Date().toISOString() : null 
    } : t));
    showToast(bill?.paid ? 'Tagihan ditandai belum bayar' : '✨ Tagihan ditandai lunas!');
    return !bill?.paid;
  };
  
  const deleteTagihan = (id) => {
    const bill = tagihan.find(t => t.id === id);
    setTagihan(tagihan.filter(t => t.id !== id));
    showToast(`"${bill?.name}" dihapus`);
  };
  
  const updateTagihan = (id, patch) => {
    setTagihan(tagihan.map(t => t.id === id ? { ...t, ...patch } : t));
    showToast('Tagihan diperbarui');
  };
  
  // ========== MOVE TAGIHAN TO DATE ==========
  // Logika PINDAHKAN: 
  // 1. Tagihan DITAMBAHKAN ke tanggal tujuan
  // 2. Tagihan DIHAPUS dari tanggal asal
  // Jika ada tagihan dengan nama sama di tujuan → jumlah digabung
  const moveTagihanToDate = (tagihanId, newDate) => {
    const original = tagihan.find(t => t.id === tagihanId);
    if (!original) return;
    
    // Jika tanggal tujuan sama dengan tanggal asal, tidak perlu pindah
    if (original.dueDate === newDate) {
      showToast('Tagihan sudah berada di tanggal tersebut');
      return;
    }
    
    // Cek apakah ada tagihan dengan nama yang sama di tanggal tujuan
    const existingOnNewDate = tagihan.find(t => 
      t.dueDate === newDate && 
      t.name.toLowerCase() === original.name.toLowerCase() &&
      t.id !== tagihanId
    );
    
    if (existingOnNewDate) {
      // PINDAHKAN dengan GABUNG: 
      // - Jumlah dari asal ditambahkan ke tujuan
      // - Tagihan asal dihapus
      const mergedAmount = existingOnNewDate.amount + original.amount;
      setTagihan(tagihan.map(t => {
        if (t.id === existingOnNewDate.id) {
          return { ...t, amount: mergedAmount };
        }
        if (t.id === tagihanId) {
          return null; // Hapus dari asal
        }
        return t;
      }).filter(Boolean));
      showToast(`✓ Dipindahkan & digabung: ${original.name} = ${fmt(mergedAmount)} di ${idDateShort(newDate)}`);
    } else {
      // PINDAHKAN biasa:
      // - Tagihan dipindahkan ke tanggal tujuan
      // - Posisi asal otomatis kosong (karena tanggal berubah)
      setTagihan(tagihan.map(t => t.id === tagihanId ? { 
        ...t, 
        dueDate: newDate,
        paid: false,
        paidAt: null
      } : t));
      showToast(`✓ Dipindahkan dari ${idDateShort(original.dueDate)} ke ${idDateShort(newDate)}`);
    }
  };
  
  // ========== TUTUP BUKU PERIODE ==========
  const tutupBukuPeriode = () => {
    if (tagihan.length === 0) {
      showToast('Tidak ada tagihan untuk ditutup', 'error');
      return;
    }
    
    const periodData = {
      id: uid(),
      closedAt: new Date().toISOString(),
      period: { ...period },
      incomes: [...incomes],
      tagihan: [...tagihan],
      summary: {
        totalIncome: totalIncome,
        totalTagihan: tagihan.reduce((s, t) => s + t.amount, 0),
        totalPaid: tagihan.filter(t => t.paid).reduce((s, t) => s + t.amount, 0),
        paidCount: tagihan.filter(t => t.paid).length,
        unpaidCount: tagihan.filter(t => !t.paid).length
      }
    };
    
    setBukuPeriode([periodData, ...bukuPeriode]);
    setTagihan([]);
    showToast('Periode berhasil ditutup!');
    setSubTab('buku-periode');
  };
  
  const deleteBukuPeriode = (id) => {
    setBukuPeriode(bukuPeriode.filter(b => b.id !== id));
    showToast('Buku periode dihapus');
  };
  
  // ========== CALCULATIONS ==========
  const totalIncome = incomes.filter(i => i.amount > 0).reduce((s, i) => s + Number(i.amount), 0);
  
  // Calculate total simulation bills (accounting for recurring)
  const calcTotalBillsForPeriod = (bills, startPeriod, endPeriod, filterFn = () => true) => {
    const startDate = parseLocalDate(startPeriod);
    const endDate = parseLocalDate(endPeriod);
    const startDay = startDate.getDate();
    const endDay = endDate.getDate();

    return bills.filter(filterFn).reduce((total, bill) => {
      if (!bill.amount || bill.amount <= 0) return total;
      const billDate = parseLocalDate(bill.dueDate);
      const dueDay = billDate ? billDate.getDate() : 1;

      if (bill.recurring && bill.recurringDays > 0) {
        let occurrences = 0;
        for (let day = startDay; day <= endDay; day++) {
          if (day >= dueDay && (day - dueDay) % bill.recurringDays === 0) {
            occurrences++;
          }
        }
        return total + (bill.amount * occurrences);
      } else {
        if (dueDay >= startDay && dueDay <= endDay) {
          return total + bill.amount;
        }
        return total;
      }
    }, 0);
  };

  const countTotalBillsForPeriod = (bills, startPeriod, endPeriod, filterFn = () => true) => {
    const startDate = parseLocalDate(startPeriod);
    const endDate = parseLocalDate(endPeriod);
    const startDay = startDate.getDate();
    const endDay = endDate.getDate();
    let count = 0;

    bills.filter(filterFn).forEach(bill => {
      if (!bill.amount || bill.amount <= 0) return;
      const billDate = parseLocalDate(bill.dueDate);
      const dueDay = billDate ? billDate.getDate() : 1;

      if (bill.recurring && bill.recurringDays > 0) {
        for (let day = startDay; day <= endDay; day++) {
          if (day >= dueDay && (day - dueDay) % bill.recurringDays === 0) {
            count++;
          }
        }
      } else {
        if (dueDay >= startDay && dueDay <= endDay) {
          count++;
        }
      }
    });

    return count;
  };

  const totalSimBills = calcTotalBillsForPeriod(simBills, period.start, period.end, b => b.amount > 0);
  const simBillsCount = countTotalBillsForPeriod(simBills, period.start, period.end, b => b.amount > 0);
  
  // For tagihan, each is an individual occurrence
  const totalTagihan = tagihan.filter(t => !t.paid).reduce((s, t) => s + Number(t.amount), 0);
  const totalPaid = tagihan.filter(t => t.paid).reduce((s, t) => s + Number(t.amount), 0);
  const paidCount = tagihan.filter(t => t.paid).length;
  const unpaidCount = tagihan.filter(t => !t.paid).length;
  
  // ========== CALENDAR DATA ==========
  const startDate = parseLocalDate(period.start);
  const calendarMonth = startDate || new Date();
  const calendarYear = calendarMonth.getFullYear();
  const calendarMonthIdx = calendarMonth.getMonth();
  const calendarDates = getMonthDates(calendarYear, calendarMonthIdx);
  
  // Get bills for each calendar date
  const getBillsForDate = (date) => {
    const dateStr = iso(date);
    return tagihan.filter(t => t.dueDate === dateStr);
  };
  
  const weekDays = ['Min', 'Sen', 'Sel', 'Rab', 'Kam', 'Jum', 'Sab'];
  const todayDate = new Date();
  const isToday = (date) => {
    return date.getDate() === todayDate.getDate() && 
           date.getMonth() === todayDate.getMonth() && 
           date.getFullYear() === todayDate.getFullYear();
  };

  // ========== GENERATE SIMULASI SUMMARY FOR SHARING ==========
  const generateSimulasiSummary = () => {
    const monthNames = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
    const startDate = parseLocalDate(period.start);
    const endDate = parseLocalDate(period.end);
    
    let summary = `📊 *RINGKASAN SIMULASI TAGIHAN*\n`;
    summary += `━━━━━━━━━━━━━━━━━━━━━\n`;
    summary += `📅 Periode: ${startDate.getDate()} - ${endDate.getDate()} ${monthNames[startDate.getMonth()]} ${startDate.getFullYear()}\n\n`;
    
    summary += `💰 *Pemasukan:*\n`;
    incomes.forEach(inc => {
      if (inc.amount > 0) {
        summary += `  • ${inc.name || 'Tidak bernama'}: ${fmt(inc.amount)}\n`;
      }
    });
    summary += `  ───────────────\n`;
    summary += `  *Total: ${fmt(totalIncome)}*\n\n`;
    
    summary += `🧾 *Simulasi Tagihan Per Tanggal:*\n`;
    
    // Group simBills by date
    const groups = {};
    simBills.forEach(bill => {
      if (bill.amount > 0) {
        const dateKey = bill.dueDate;
        if (!groups[dateKey]) {
          groups[dateKey] = [];
        }
        groups[dateKey].push(bill);
      }
    });
    
    const sortedDates = Object.keys(groups).sort((a, b) => {
      const dateA = parseLocalDate(a);
      const dateB = parseLocalDate(b);
      return dateA - dateB;
    });
    
    sortedDates.forEach(dateKey => {
      const bills = groups[dateKey];
      const dateTotal = bills.reduce((sum, b) => sum + b.amount, 0);
      
      summary += `\n📅 *${idDateFull(dateKey)}*\n`;
      bills.forEach(bill => {
        const recurringText = bill.recurring ? ` (tiap ${bill.recurringDays} hari)` : '';
        summary += `  • ${bill.name}: ${fmt(bill.amount)}${recurringText}\n`;
      });
      summary += `  _Total: ${fmt(dateTotal)}_\n`;
    });
    
    summary += `\n━━━━━━━━━━━━━━━━━━━━━\n`;
    summary += `📊 *Rekapitulasi:*\n`;
    summary += `  • Total Tagihan: ${fmt(totalSimBills)}\n`;
    summary += `  • Jumlah Item: ${simBillsCount}\n`;
    const sisa = totalIncome - totalSimBills;
    summary += `  • Sisa: ${fmt(sisa)}\n`;
    summary += `━━━━━━━━━━━━━━━━━━━━━\n`;
    summary += `_Generated by Gibikey Rich v2.5 (Cloud)_`;
    
    return summary;
  };

  const shareToWhatsApp = () => {
    const summary = generateSimulasiSummary();
    const encodedText = encodeURIComponent(summary);
    const waNumber = '6285298833350';
    const waUrl = `https://wa.me/${waNumber}?text=${encodedText}`;
    window.open(waUrl, '_blank');
    showToast('Membuka WhatsApp...');
  };

  const copyToClipboard = () => {
    const summary = generateSimulasiSummary();
    navigator.clipboard.writeText(summary).then(() => {
      showToast('Ringkasan berhasil disalin ke clipboard!');
    }).catch(() => {

                                      <div style={{ fontSize: 13, color: 'var(--fb-text-secondary)' }}>
                                        {fmt(bill.amount)}
                                        {bill.recurringDays > 0 && <span style={{ fontSize: 11, marginLeft: 8 }}>(tiap {bill.recurringDays} hari)</span>}
                                      </div>
                                    </div>
                                    <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                                      <span className={`status-badge ${bill.paid ? 'paid' : 'unpaid'}`}>
                                        {bill.paid ? '✓ Lunas' : 'Belum Bayar'}
                                      </span>
                                      <button
                                        className={`fb-btn ${bill.paid ? 'fb-btn-secondary' : 'fb-btn-success'}`}
                                        style={{ fontSize: 11, padding: '4px 8px' }}
                                        onClick={() => togglePaid(bill.id)}
                                      >
                                        {bill.paid ? '↩️ Undo' : '✓ Bayar'}
                                      </button>
                                      <button
                                        className="fb-btn fb-btn-warning"
                                        style={{ fontSize: 11, padding: '4px 8px' }}
                                        onClick={() => setMoveTagihan(bill)}
                                      >
                                        📤 Pindah
                                      </button>
                                      <button
                                        className="fb-btn fb-btn-danger"
                                        style={{ fontSize: 11, padding: '4px 8px' }}
                                        onClick={() => deleteTagihan(bill.id)}
                                      >
                                        🗑
                                      </button>
                                    </div>
                                  </div>
                                </div>
                              ))}
                            </div>
                          ))}
                        </>
                      )}
                    </div>
                  </div>
                )}

                {subTab === 'buku-periode' && (
                  <div>
                    <div className="fb-card" style={{ padding: 16 }}>
                      <h3 style={{ margin: '0 0 12px 0' }}>📕 Buku Periode (Riwayat)</h3>
                      
                      {bukuPeriode.length === 0 ? (
                        <p style={{ color: 'var(--fb-text-secondary)', textAlign: 'center', padding: 20 }}>
                          Belum ada periode yang ditutup. Klik "Tutup Buku Periode" di tab Kalender untuk menyimpan periode.
                        </p>
                      ) : (
                        bukuPeriode.map(buku => (
                          <div key={buku.id} className="saved-sim-card">
                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
                              <div>
                                <div style={{ fontWeight: 600 }}>Periode: {idDateFull(buku.period.start)} - {idDateFull(buku.period.end)}</div>
                                <div style={{ fontSize: 12, color: 'var(--fb-text-secondary)' }}>
                                  Ditutup: {new Date(buku.closedAt).toLocaleString('id-ID')}
                                </div>
                              </div>
                              <button className="fb-btn fb-btn-danger" style={{ fontSize: 12, padding: '6px 12px' }} onClick={() => deleteBukuPeriode(buku.id)}>
                                🗑 Hapus
                              </button>
                            </div>
                            <div className="grid-5-cols">
                              <div className="summary-grid-item">
                                <div style={{ fontSize: 11, color: 'var(--fb-text-secondary)' }}>Pemasukan</div>
                                <div style={{ fontSize: 14, fontWeight: 700 }}>{fmt(buku.summary?.totalIncome || 0)}</div>
                              </div>
                              <div className="summary-grid-item">
                                <div style={{ fontSize: 11, color: 'var(--fb-text-secondary)' }}>Total Tagihan</div>
                                <div style={{ fontSize: 14, fontWeight: 700 }}>{fmt(buku.summary?.totalTagihan || 0)}</div>
                              </div>
                              <div className="summary-grid-item" style={{ borderLeftColor: 'var(--fb-green)' }}>
                                <div style={{ fontSize: 11, color: 'var(--fb-text-secondary)' }}>Dibayar</div>
                                <div style={{ fontSize: 14, fontWeight: 700, color: 'var(--fb-green)' }}>{fmt(buku.summary?.totalPaid || 0)}</div>
                              </div>
                              <div className="summary-grid-item">
                                <div style={{ fontSize: 11, color: 'var(--fb-text-secondary)' }}>Lunas</div>
                                <div style={{ fontSize: 14, fontWeight: 700 }}>{buku.summary?.paidCount || 0}</div>
                              </div>
                              <div className="summary-grid-item" style={{ borderLeftColor: 'var(--warning)' }}>
                                <div style={{ fontSize: 11, color: 'var(--fb-text-secondary)' }}>Belum Bayar</div>
                                <div style={{ fontSize: 14, fontWeight: 700, color: 'var(--warning)' }}>{buku.summary?.unpaidCount || 0}</div>
                              </div>
                            </div>
                          </div>
                        ))
                      )}
                    </div>
                  </div>
                )}
              </div>
            )}
          </main>

          {/* Edit SimBill Modal */}
          {editingSimBill && (
            <div className="modal-overlay" onClick={() => setEditingSimBill(null)}>
              <div className="modal" onClick={(e) => e.stopPropagation()}>
                <div className="modal-header">
                  <h3 className="modal-title">{editingSimBill.id ? 'Edit' : 'Tambah'} Tagihan Simulasi</h3>
                  <button onClick={() => setEditingSimBill(null)} style={{ background: 'none', border: 'none', fontSize: 24, cursor: 'pointer' }}>×</button>
                </div>
                <div className="modal-body">
                  <div style={{ marginBottom: 12 }}>
                    <label style={{ display: 'block', marginBottom: 6, fontWeight: 500 }}>Nama Tagihan</label>
                    <input
                      type="text"
                      className="fb-input"
                      placeholder="Contoh: Listrik, Air, Internet..."
                      defaultValue={editingSimBill.name || ''}
                      id="simBillName"
                    />
                  </div>
                  <div style={{ marginBottom: 12 }}>
                    <label style={{ display: 'block', marginBottom: 6, fontWeight: 500 }}>Jumlah (Rp)</label>
                    <input
                      type="number"
                      className="fb-input"
                      placeholder="0"
                      defaultValue={editingSimBill.amount || ''}
                      id="simBillAmount"
                    />
                  </div>
                  <div style={{ marginBottom: 12 }}>
                    <label style={{ display: 'block', marginBottom: 6, fontWeight: 500 }}>Jatuh Tempo</label>
                    <input
                      type="date"
                      className="fb-input"
                      defaultValue={editingSimBill.dueDate || period.start}
                      id="simBillDueDate"
                    />
                  </div>
                  <div style={{ marginBottom: 12 }}>
                    <label style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                      <input
                        type="checkbox"
                        defaultChecked={editingSimBill.recurring || false}
                        id="simBillRecurring"
                      />
                      <span>Tagihan berulang</span>
                    </label>
                  </div>
                  <div style={{ marginBottom: 12 }}>
                    <label style={{ display: 'block', marginBottom: 6, fontWeight: 500 }}>Ulang setiap (hari)</label>
                    <input
                      type="number"
                      className="fb-input"
                      placeholder="7 untuk mingguan, 30 untuk bulanan..."
                      defaultValue={editingSimBill.recurringDays || ''}
                      id="simBillRecurringDays"
                      disabled={!document.getElementById('simBillRecurring')?.checked}
                    />
                  </div>
                </div>
                <div className="modal-footer">
                  <button className="fb-btn fb-btn-secondary" onClick={() => setEditingSimBill(null)}>Batal</button>
                  <button className="fb-btn fb-btn-success" onClick={() => {
                    const name = document.getElementById('simBillName').value;
                    const amount = Number(document.getElementById('simBillAmount').value);
                    const dueDate = document.getElementById('simBillDueDate').value;
                    const recurring = document.getElementById('simBillRecurring').checked;
                    const recurringDays = Number(document.getElementById('simBillRecurringDays').value) || 0;
                    
                    if (saveSimBill({ ...editingSimBill, name, amount, dueDate, recurring, recurringDays })) {
                      setEditingSimBill(null);
                    }
                  }}>Simpan</button>
                </div>
              </div>
            </div>
          )}

          {/* Edit Tagihan Modal */}
          {editingTagihan && (
            <div className="modal-overlay" onClick={() => setEditingTagihan(null)}>
              <div className="modal" onClick={(e) => e.stopPropagation()}>
                <div className="modal-header">
                  <h3 className="modal-title">Detail Tagihan</h3>
                  <button onClick={() => setEditingTagihan(null)} style={{ background: 'none', border: 'none', fontSize: 24, cursor: 'pointer' }}>×</button>
                </div>
                <div className="modal-body">
                  <div style={{ marginBottom: 16 }}>
                    <strong>{editingTagihan.name}</strong>
                    <div style={{ fontSize: 20, color: 'var(--fb-blue)', marginTop: 8 }}>{fmt(editingTagihan.amount)}</div>
                    <div style={{ fontSize: 13, color: 'var(--fb-text-secondary)', marginTop: 4 }}>
                      Jatuh tempo: {idDateFull(editingTagihan.dueDate)}
                    </div>
                  </div>
                  <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                    <button
                      className={`fb-btn ${editingTagihan.paid ? 'fb-btn-secondary' : 'fb-btn-success'}`}
                      onClick={() => {
                        togglePaid(editingTagihan.id);
                        setEditingTagihan(null);
                      }}
                    >
                      {editingTagihan.paid ? '↩️ Tandai Belum Bayar' : '✓ Tandai Lunas'}
                    </button>
                    <button
                      className="fb-btn fb-btn-warning"
                      onClick={() => {
                        setMoveTagihan(editingTagihan);
                        setEditingTagihan(null);
                      }}
                    >
                      📤 Pindahkan
                    </button>
                    <button
                      className="fb-btn fb-btn-danger"
                      onClick={() => {
                        deleteTagihan(editingTagihan.id);
                        setEditingTagihan(null);
                      }}
                    >
                      🗑 Hapus
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* Move Tagihan Modal */}
          {moveTagihan && (
            <div className="modal-overlay" onClick={() => setMoveTagihan(null)}>
              <div className="modal" onClick={(e) => e.stopPropagation()}>
                <div className="modal-header">
                  <h3 className="modal-title">📤 Pindahkan Tagihan</h3>
                  <button onClick={() => setMoveTagihan(null)} style={{ background: 'none', border: 'none', fontSize: 24, cursor: 'pointer' }}>×</button>
                </div>
                <div className="modal-body">
                  <p style={{ marginBottom: 16 }}>
                    Pindahkan <strong>{moveTagihan.name}</strong> ({fmt(moveTagihan.amount)}) dari <strong>{idDateFull(moveTagihan.dueDate)}</strong> ke:
                  </p>
                  <input
                    type="date"
                    className="fb-input"
                    defaultValue={moveTagihan.dueDate}
                    id="moveTagihanDate"
                  />
                  <div style={{ marginTop: 12, fontSize: 12, color: 'var(--fb-text-secondary)' }}>
                    <strong>Catatan:</strong> Jika sudah ada tagihan dengan nama yang sama di tanggal tujuan, jumlah akan digabung.
                  </div>
                </div>
                <div className="modal-footer">
                  <button className="fb-btn fb-btn-secondary" onClick={() => setMoveTagihan(null)}>Batal</button>
                  <button className="fb-btn fb-btn-warning" onClick={() => {
                    const newDate = document.getElementById('moveTagihanDate').value;
                    moveTagihanToDate(moveTagihan.id, newDate);
                    setMoveTagihan(null);
                  }}>Pindahkan</button>
                </div>
              </div>
            </div>
          )}

          {/* Template Manager Modal */}
          {showTemplateManager && (
            <div className="modal-overlay" onClick={() => setShowTemplateManager(false)}>
              <div className="modal" onClick={(e) => e.stopPropagation()} style={{ maxWidth: 600 }}>
                <div className="modal-header">
                  <h3 className="modal-title">📋 Template Tagihan</h3>
                  <button onClick={() => setShowTemplateManager(false)} style={{ background: 'none', border: 'none', fontSize: 24, cursor: 'pointer' }}>×</button>
                </div>
                <div className="modal-body">
                  <p style={{ fontSize: 13, color: 'var(--fb-text-secondary)', marginBottom: 16 }}>
                    Template memudahkan Anda menambahkan tagihan yang sering digunakan.
                  </p>

                  {/* Add Template Form */}
                  <div style={{ background: 'var(--fb-gray-light)', padding: 12, borderRadius: 8, marginBottom: 16 }}>
                    <div style={{ fontWeight: 600, marginBottom: 8 }}>+ Template Baru</div>
                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8, marginBottom: 8 }}>
                      <input type="text" className="fb-input" placeholder="Nama template" id="templateName" />
                      <input type="number" className="fb-input" placeholder="Jumlah" id="templateAmount" />
                    </div>
                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8, marginBottom: 8 }}>
                      <div>
                        <label style={{ fontSize: 11, color: 'var(--fb-text-secondary)' }}>Jatuh Tempo</label>
                        <input type="date" className="fb-input" defaultValue={period.start} id="templateDueDate" />
                      </div>
                      <div>
                        <label style={{ fontSize: 11, color: 'var(--fb-text-secondary)' }}>Ulang (hari)</label>
                        <input type="number" className="fb-input" placeholder="0 = sekali" id="templateRecurring" />
                      </div>
                    </div>
                    <button className="fb-btn fb-btn-success" style={{ width: '100%' }} onClick={() => {
                      const name = document.getElementById('templateName').value;
                      const amount = Number(document.getElementById('templateAmount').value);
                      const dueDate = document.getElementById('templateDueDate').value;
                      const recurringDays = Number(document.getElementById('templateRecurring').value) || 0;
                      
                      if (!name || amount <= 0) {
                        showToast('Lengkapi nama dan jumlah', 'error');
                        return;
                      }
                      
                      addTemplate({ name, amount, dueDate, recurringDays, recurring: recurringDays > 0 });
                      document.getElementById('templateName').value = '';
                      document.getElementById('templateAmount').value = '';
                    }}>+ Tambah Template</button>
                  </div>

                  {/* Template List */}
                  {templates.length === 0 ? (
                    <p style={{ textAlign: 'center', color: 'var(--fb-text-secondary)', padding: 20 }}>Belum ada template</p>
                  ) : (
                    templates.map(template => (
                      <div key={template.id} className="template-card">
                        <div>
                          <div style={{ fontWeight: 600 }}>{template.name}</div>
                          <div style={{ fontSize: 12, color: 'var(--fb-text-secondary)' }}>
                            {fmt(template.amount)}
                            {template.recurring && <span style={{ marginLeft: 8 }} className="status-badge recurring">tiap {template.recurringDays} hari</span>}
                          </div>
                        </div>
                        <div style={{ display: 'flex', gap: 8 }}>
                          <button className="fb-btn" style={{ fontSize: 11, padding: '4px 8px' }} onClick={() => {
                            // Add to simulation
                            saveSimBill({
                              name: template.name,
                              amount: template.amount,
                              dueDate: template.dueDate,
                              recurring: template.recurring,
                              recurringDays: template.recurringDays
                            });
                            showToast(`"${template.name}" ditambahkan ke simulasi`);
                          }}>+ Pakai</button>
                          <button className="fb-btn fb-btn-danger" style={{ fontSize: 11, padding: '4px 8px' }} onClick={() => deleteTemplate(template.id)}>🗑</button>
                        </div>
                      </div>
                    ))
                  )}
                </div>
              </div>
            </div>
          )}

          {/* Firebase Settings Modal */}
          {renderFirebaseSettingsModal()}

          {/* Toast */}
          {toast}
        </>
      )}
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
